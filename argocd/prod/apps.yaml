apiVersion: v1
kind: List
items:
  - apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: ai-service-prod
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://github.com/NexaflowB2B/nexaflow-helm.git
        path: apps/ai-service
        helm:
          valueFiles:
            - values.yaml
            - values-prod.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: prod
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

