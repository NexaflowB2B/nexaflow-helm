apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexaflow-infra-prod
  namespace: argocd
spec:
  source:
    repoURL: https://github.com/NexaflowB2B/nexaflow-helm.git
    path: infra/prod
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
