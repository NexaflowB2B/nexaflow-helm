apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default
  source:
    repoURL: https://github.com/NexaflowB2B/nexaflow-helm.git
    path: infra/prod/sealed-secrets
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
