apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  name: nexaflow-infra-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/NexaflowB2B/nexaflow-helm.git
    path: infra/dev
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: dev

