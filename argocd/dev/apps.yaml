apiVersion: v1
kind: List
items:
  - apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: ai-service-dev
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: default
      source:
        repoURL: https://github.com/NexaflowB2B/nexaflow-helm.git
        targetRevision: HEAD
        path: apps/ai-service
        helm:
          valueFiles:
            - values.yaml
            - values-dev.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: dev
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true
          - ApplyOutOfSyncOnly=true
      ignoreDifferences:
        - group: ""
          kind: Service
          jsonPointers:
            - /spec/clusterIP
            - /spec/clusterIPs
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
        - group: "*"
          kind: "*"
          jsonPointers:
            - /metadata/managedFields
            - /metadata/resourceVersion
            - /metadata/generation

