apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.appName }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nexaflow.labels" . | nindent 4 }}
spec:
  encryptedData:
    # ACTION: Replace this placeholder with your output from 'kubeseal'
    # Command: echo -n "your-secret" | kubeseal --raw --name {{ .Values.appName }}-secret --namespace {{ .Values.namespace }}
    SECRET_KEY: {{ .Values.secret.sealedData.SECRET_KEY | default "Ag...PLACEHOLDER_REPLACE_ME..." | quote }}
