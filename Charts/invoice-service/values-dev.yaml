namespace: "dev"
appName: "invoice-service"
secret:
  create: true
  sealedData:
    SECRET_KEY: ""
    DATABASE_URL: ""
env:
  - name: SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: invoice-service-secret
        key: SECRET_KEY
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: invoice-service-secret
        key: DATABASE_URL
  - name: ALGORITHM
    value: "HS256"