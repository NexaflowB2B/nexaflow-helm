namespace: "dev"
appName: "ai-service"
secret:
  create: true
  sealedData:
    SECRET_KEY: ""
    DATABASE_URL: ""
    GOOGLE_GENAI_API_KEY: ""
env:
  - name: SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: ai-service-secret
        key: SECRET_KEY
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: ai-service-secret
        key: DATABASE_URL
  - name: GOOGLE_GENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: ai-service-secret
        key: GOOGLE_GENAI_API_KEY
  - name: ALGORITHM
    value: "HS256"