namespace: "dev"
secret:
  create: true
  stringData:
    GEMINI_API_KEY: "dev_gemini_key_here"
env:
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: db-credentials
        key: DATABASE_URL
  - name: GEMINI_API_KEY
    valueFrom:
      secretKeyRef:
        name: ai-service-secret
        key: GEMINI_API_KEY
