namespace: ""
appName: "ai-service"
replicaCount: 1
image:
  repository: "ghcr.io/nexaflowb2b/ai-service"
  tag: "latest"
  pullPolicy: IfNotPresent
service:
  name: "ai-service"
  port: 8005
config:
  map: {}
secret:
  create: true
  sealedData:
    SECRET_KEY: "" # Paste your kubeseal output here
    GOOGLE_GENAI_API_KEY: "" # Paste your kubeseal output here
env: []


imagePullSecrets:
  - name: ghcr-login
