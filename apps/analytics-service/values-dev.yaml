namespace: "dev"
appName: "analytics-service"
secret:
  create: true
  sealedData:
    SECRET_KEY: ""
    DATABASE_URL: ""
env:
  - name: SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: analytics-service-secret
        key: SECRET_KEY
  - name: DATABASE_URL
    value: "postgresql://postgres:postgres@postgres:5432/finventory_db"
  - name: ALGORITHM
    value: "HS256"
image:
  tag: c4033
