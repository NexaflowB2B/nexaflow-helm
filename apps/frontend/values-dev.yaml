namespace: "dev"
config:
  map:
    default.conf: |
      server {
          listen 80;
          server_name _;
          root /usr/share/nginx/html;
          index login.html;
          location / { try_files $uri $uri/ /login.html; }
          location ~* \.html$ { add_header Cache-Control "no-cache"; }
          location ~* \.(css|js)$ { add_header Cache-Control "public, max-age=3600"; }
      }
image:
  tag: "61349"
