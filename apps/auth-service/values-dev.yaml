namespace: "dev"
secret:
  create: true
  sealedData:
    DATABASE_URL: ""
    SECRET_KEY: ""
env:
  - name: DATABASE_URL
    value: "postgresql://postgres:postgres@postgres:5432/finventory_db"
  - name: SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: auth-service-secret
        key: SECRET_KEY
  - name: ALGORITHM
    value: "HS256"
  - name: ACCESS_TOKEN_EXPIRE_MINUTES
    value: "60"
