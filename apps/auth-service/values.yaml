namespace: ""
appName: "auth-service"
replicaCount: 1
image:
  repository: "ghcr.io/nexaflowb2b/auth-service"
  tag: "latest"
  pullPolicy: IfNotPresent
service:
  name: "auth-service"
  port: 8001
config:
  map: {}
secret:
  create: true
  sealedData:
    DATABASE_URL: "" # Paste your kubeseal output here
    SECRET_KEY: "" # Paste your kubeseal output here
env:
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: auth-service-secret
        key: DATABASE_URL
  - name: SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: auth-service-secret
        key: SECRET_KEY
  - name: ALGORITHM
    value: "HS256"
  - name: ACCESS_TOKEN_EXPIRE_MINUTES
    value: "60"
dbInit:
  enabled: true
  command:
    - python
    - initdb.py
  backoffLimit: 6
  activeDeadlineSeconds: 600

imagePullSecrets:
  - name: ghcr-login
