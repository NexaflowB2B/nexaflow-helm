namespace: "dev"
secret:
  create: true
  sealedData:
    SECRET_KEY: ""
    DATABASE_URL: ""
env:
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: inventory-service-secret
        key: DATABASE_URL
  - name: SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: inventory-service-secret
        key: SECRET_KEY
  - name: ALGORITHM
    value: "HS256"
  - name: ACCESS_TOKEN_EXPIRE_MINUTES
    value: "60"
