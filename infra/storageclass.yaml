apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nexaflow-storage
# For local/on-prem clusters without dynamic provisioning, use 'kubernetes.io/no-provisioner'
# For AWS: 'ebs.csi.aws.com', For GKE: 'pd.csi.storage.gke.io'
provisioner: kubernetes.io/no-provisioner
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
mountOptions:
  - nfsvers=4.1