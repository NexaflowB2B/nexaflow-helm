apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: dev
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-services
  namespace: dev
spec:
  podSelector: {}
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: dev # Allow traffic from within same namespace
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: istio-system # Allow traffic from gateway (standard istio ns)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-services-to-db
  namespace: dev
spec:
  podSelector:
    matchLabels:
      app: postgres
  ingress:
  - from:
    - podSelector: {} # Allow all pods in the same namespace to talk to Postgres
  policyTypes:
  - Ingress
